<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h2>Welcome, <span id="username"></span></h2>

        <div id="subscription-area">
            <h3>Your Subscriptions</h3>
            <!-- Display subscribed music here -->
        </div>

        <div id="query-area">
            <h3>Search Music</h3>
            <form id="searchForm">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="Song Title"><br>

                <label for="artist">Artist</label>
                <input type="text" id="artist" placeholder="Artist"><br>

                <label for="album">Album</label>
                <input type="text" id="album" placeholder="Album"><br>

                <label for="year">Year</label>
                <input type="number" id="year" placeholder="Year"><br>

                <button type="submit">Query</button>
            </form>

            <div id="results"></div> <!-- Query results here -->
        </div>

        <a href="login.html" id="logout">Logout</a>
    </div>

    <script src="main.js"></script>
</body>
</html>
