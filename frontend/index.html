<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - Music Subscription App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Welcome to the Music Subscription App!</h2>
    <p id="user-name"></p>
    
    <h3>Subscribe to Songs:</h3>
    <form id="search-form">
        <alabel for="artist">Artist:</alabel>
        <input type="text" id="artist" name="artist"><br><br>

        <label for="album">Album:</label>
        <input type="text" id="album" name="album"><br><br>

        <label for="year">Year:</label>
        <input type="number" id="year" name="year"><br><br>

        <button type="submit">Search</button>
    </form>

    <h3>Subscription Area</h3>
    <div id="subscriptions"></div>

    <button onclick="logout()">Logout</button>

    <script src="main.js"></script>
</body>
</html>
